services:
  mysql:
    image: mysql:8.0
    container_name: wintam-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: wintam
    ports:
      - "3306:3306"
    volumes:
      - wintam-data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: wintam-phpmyadmin
    environment:
      PMA_HOST: mysql
      PMA_USER: root
      PMA_PASSWORD: root
    ports:
      - "8081:80"
    depends_on:
      - mysql

volumes:
  wintam-data: